baseURL = "https://workshop-sample.fcjuni.com/"
relativeURLs = false
canonifyURLs = false
defaultContentLanguage = "en"
disableLanguages = [] 
buildFuture = true

# Khai báo Theme
theme = "hugo-theme-learn"

[outputs]
home = [ "HTML", "RSS", "JSON"]

# Cấu hình bảo mật để chạy được các shortcode hiện đại
[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['(?i)https://api\.github\.com/.*']

[params]
  themeVariant = "workshop"
  author = "Võ Tiến Khoa"
  description = "Báo cáo thực tập AWS Cloud Journey"
  showVisitedLinks = true
  disableBreadcrumb = false
  disableNextPrev = false
  # Tùy chọn hiển thị công cụ tìm kiếm
  editURL = ""

[languages]
  [languages.en]
    contentDir = "content"
    title = "Internship Report"
    weight = 1
    label = "English"

    # Các liên kết nhanh ở dưới cùng menu bên trái (giống mẫu)
    [[languages.en.menu.shortcuts]]
      name = "<i class='fab fa-aws'></i> AWS Study Group - Blog"
      identifier = "aws-blog"
      url = "https://awsstudygroup.com"
      weight = 10

    [[languages.en.menu.shortcuts]]
      name = "<i class='fab fa-facebook'></i> AWS Study Group - FB Group"
      identifier = "aws-fb"
      url = "https://www.facebook.com/groups/awsstudygroupfcj"
      weight = 20

  [languages.vi]
    contentDir = "content"
    title = "Báo cáo thực tập"
    weight = 2
    label = "Tiếng Việt"

    [[languages.vi.menu.shortcuts]]
      name = "<i class='fab fa-aws'></i> AWS Study Group - Blog"
      identifier = "aws-blog-vi"
      url = "https://awsstudygroup.com"
      weight = 10

    [[languages.vi.menu.shortcuts]]
      name = "<i class='fab fa-facebook'></i> AWS Study Group - Nhóm FB"
      identifier = "aws-fb-vi"
      url = "https://www.facebook.com/groups/awsstudygroupfcj"
      weight = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # Cho phép sử dụng HTML trong Markdown (cần thiết cho theme này)